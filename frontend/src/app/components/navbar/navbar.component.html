<nav class="ks-nav navbar navbar-expand-lg sticky-top">
  <div class="container-xl px-3">

    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/">
      <div class="nav-logo"><i class="bi bi-globe-americas"></i></div>
      <span class="brand-name">KnowSphere</span>
    </a>

    <!-- Search box — hidden on home page (hero has its own), always shown elsewhere -->
    @if (!isHome()) {
      <div class="nav-search flex-grow-1 mx-3 d-none d-md-flex" style="max-width:420px">
        <i class="bi bi-search"></i>
        <input
          [(ngModel)]="q"
          (keydown.enter)="search()"
          placeholder="Search any topic, city, term…" />
        @if (q) {
          <i class="bi bi-x nav-clear" (click)="q=''"></i>
        }
      </div>
    }

    <!-- Mobile toggler -->
    <button class="navbar-toggler border-0 ms-auto" type="button"
            data-bs-toggle="collapse" data-bs-target="#ksNav">
      <i class="bi bi-list fs-4"></i>
    </button>

    <!-- Nav links -->
    <div class="collapse navbar-collapse" id="ksNav">

      <!-- Mobile search (inside collapse) -->
      @if (!isHome()) {
        <div class="nav-search d-flex d-md-none my-2 w-100">
          <i class="bi bi-search"></i>
          <input
            [(ngModel)]="q"
            (keydown.enter)="search()"
            placeholder="Search…" />
        </div>
      }

      <ul class="navbar-nav ms-auto align-items-lg-center gap-1">
        <li class="nav-item">
          <a class="ks-link" routerLink="/"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{exact:true}">Home</a>
        </li>
        <li class="nav-item">
          <a class="ks-link" routerLink="/categories" routerLinkActive="active">Categories</a>
        </li>
        <li class="nav-item">
          <a class="ks-link" routerLink="/about" routerLinkActive="active">About</a>
        </li>
        <li class="nav-item ms-lg-2">
          <a routerLink="/search" class="btn-ai">
            <i class="bi bi-stars"></i> Try AI Search
          </a>
        </li>
      </ul>
    </div>

  </div>
</nav>
